version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - gocritic
    - revive
    - nilerr
    - wastedassign
  settings:
    govet:
      enable-all: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam # false-positive on value receivers with small structs
        - unnamedResult # naming return values is optional in Go
        - dupSubExpr # flags intentional duplicate args in tests
    revive:
      rules:
        - name: exported
          arguments: ["checkPrivateReceivers"]
        - name: unused-parameter
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
